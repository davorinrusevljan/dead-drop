name: Deploy API Docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/core/src/api/**'
      - 'scripts/build-api-docs.mjs'
      - '.github/workflows/deploy-api-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-docs:
    name: Build API Docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build engine package
        run: pnpm --filter @dead-drop/engine build

      - name: Checkout gh-pages branch (for version history)
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-existing
        continue-on-error: true

      - name: Build API docs
        run: pnpm build:api-docs
        env:
          GH_PAGES_DIR: gh-pages-existing

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: api-docs-dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
